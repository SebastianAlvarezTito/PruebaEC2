services:
  database:
    image: sebastianalvareztito/sql-server:2022
    container_name: sql_server_peirano
    environment:
      - TZ=America/Lima
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
    restart: always

volumes:
  mssql_data: